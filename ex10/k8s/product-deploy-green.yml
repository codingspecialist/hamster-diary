apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-green
  namespace: ex10
spec:
  replicas: 0
  selector:
    matchLabels:
      app: product
      slot: green
  template:
    metadata:
      labels:
        app: product
        slot: green
        version: v2
    spec:
      containers:
        - name: product
          image: metacoding/product-service:2.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
