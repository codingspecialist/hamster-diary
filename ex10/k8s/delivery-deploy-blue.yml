apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-blue
  namespace: ex10
spec:
  replicas: 3
  selector:
    matchLabels:
      app: delivery
      slot: blue
  template:
    metadata:
      labels:
        app: delivery
        slot: blue
        version: v1
    spec:
      containers:
        - name: delivery
          image: metacoding/delivery-service:1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
